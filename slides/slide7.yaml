    y: 4.5
    w: 11.6
    h: 1.2
    font_size: 17
    bullets:
      - The first migration preserved existing DogStatsD metric emission and moved translation into the collector layer.
      - Once the platform path was ready, one service was migrated to the OpenTelemetry SDK for logs and metrics so it was ready for switchover.
      - After that compatibility step, the application-facing workflow stayed stable even as the backend moved to SigNoz.
