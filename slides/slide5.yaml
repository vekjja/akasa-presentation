background: white
elements:
  - kind: title
    text: GKE Path

  - kind: subtitle
    text: Official SigNoz/OpenTelemetry charts wrapped in custom Pulumi SDKs

  - kind: bullets
    x: 0.8
    y: 1.55
    w: 6.0
    h: 5.1
    font_size: 18
    bullets:
      - After tuning the stack on bare metal, we deployed next into a dedicated GKE management cluster.
      - Pulumi defines cluster-facing infrastructure and deploys Helm releases as code.
      - Official charts keep the deployment aligned with upstream SigNoz/OpenTelemetry packaging and defaults.
      - "Custom Pulumi SDKs encode company conventions: namespaces, values, networking, storage classes, and environment wiring."
      - The OpenTelemetry Collector was deployed as a DaemonSet so each node had local collection capacity across the cluster.
      - We converted existing Datadog HTTP checks to OpenTelemetry-based HTTP checks as part of the management-cluster rollout.
      - Some endpoints required JSON parsing, so we contributed that functionality upstream to SigNoz in a PR.
      - GKE adds managed scheduling, autoscaling, workload isolation, and native Kubernetes operational patterns.

