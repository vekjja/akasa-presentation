background: white
elements:
  - kind: title
    text: "Phase 2: GKE Management Cluster"

  - kind: subtitle
    text: Dedicated management cluster using Pulumi and the official SigNoz/OpenTelemetry charts

  - kind: bullets
    x: 0.8
    y: 1.55
    w: 6.0
    h: 4.7
    font_size: 18
    bullets:
      - Once tuned on bare metal, the stack moved into a dedicated GKE management cluster.
      - Pulumi and the official charts made the rollout repeatable and close to upstream defaults.
      - The OpenTelemetry Collector ran as a DaemonSet to provide node-local collection across the cluster.
      - Datadog HTTP checks were converted to OpenTelemetry HTTP checks during this phase.
      - JSON parsing was needed for some endpoints, so that capability was contributed upstream to SigNoz.

  - kind: box
    x: 7.1
