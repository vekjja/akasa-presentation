background: white
elements:
  - kind: title
    text: Compatibility-First Migration

  - kind: subtitle
    text: Keep the app speaking DogStatsD first, then move the platform underneath it

  - kind: bullets
    x: 0.8
    y: 1.45
    w: 5.8
    h: 4.4
    font_size: 18
    bullets:
      - The app already emitted DogStatsD metrics for Datadog.
      - We added an OpenTelemetry Collector with a StatsD receiver to accept that traffic unchanged.
      - The first change was the collector target, not the application code.
      - That gave us a low-risk path to validate SigNoz before native OTel SDK cutover.

  - kind: box
    x: 7.0
    y: 1.7
    w: 1.9
    h: 1.0
    text: |-
      App
      DogStatsD
    fill: light_fill
    font_size: 16
    bold: true

  - kind: box
    x: 9.35
    y: 1.7
    w: 2.1
    h: 1.0
    text: |-
      OTel Collector
      StatsD receiver
    fill: pale_green
    font_size: 16
    bold: true

  - kind: box
    x: 7.0
    y: 3.35
    w: 1.9
    h: 1.0
    text: Original path
    fill: pale_orange
    font_size: 16
    bold: true

  - kind: box
    x: 9.35
    y: 3.35
    w: 2.1
    h: 1.0
    text: New path
    fill: light_fill
    font_size: 16
    bold: true

  - kind: arrow
    x1: 8.9
    y1: 2.2
    x2: 9.35
    y2: 2.2

  - kind: arrow
    x1: 10.4
    y1: 2.7
    x2: 10.4
    y2: 3.35

  - kind: note
    x: 6.95
    y: 5.25
    w: 4.8
    h: 0.45
    text: "Key message: compatibility came first, application rewrites came later."
