background: white
elements:
  - kind: title
    text: "Phase 1: Bare Metal Proving Ground"

  - kind: subtitle
    text: Dedicated Docker Compose deployment managed by custom Ansible playbooks

  - kind: bullets
    x: 0.8
    y: 1.55
    w: 6.0
    h: 4.5
    font_size: 18
    bullets:
      - The first SigNoz and OpenTelemetry deployment ran on a dedicated bare metal instance.
      - That environment let us tune receiver, processor, and export behavior before adding Kubernetes complexity.
      - Ansible handled host preparation, config templating, secrets, and `docker compose` orchestration.
      - Bare metal gave direct control over storage, networking, and operational debugging during the proving phase.

