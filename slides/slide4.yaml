background: white
elements:
  - kind: title
    text: Bare Metal Path

  - kind: subtitle
    text: Docker Compose deployment managed by custom Ansible playbooks

  - kind: bullets
    x: 0.8
    y: 1.55
    w: 6.0
    h: 5.1
    font_size: 18
    bullets:
      - Best fit for dedicated hosts, lower platform abstraction, and direct control of storage, networking, and host tuning.
      - Ansible playbooks prepare hosts, template config, ship secrets, and orchestrate `docker compose` lifecycle.
      - The first SigNoz/OpenTelemetry deployment was validated on a dedicated bare metal instance before broader rollout.
      - That initial environment was used to tune OpenTelemetry receiver, processor, and export behavior before introducing Kubernetes complexity.
      - Compose runs the observability services as a tightly-coupled stack on each target environment.
      - Persistent volumes, backup policy, firewall rules, and service exposure are managed at the host level.

