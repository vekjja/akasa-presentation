background: white
elements:
  - kind: title
    text: Why We Changed

  - kind: subtitle
    text: Standardize telemetry, reduce migration risk, and support both bare metal and Kubernetes

  - kind: bullets
    x: 0.85
    y: 1.6
    w: 5.8
    h: 4.4
    font_size: 20
    bullets:
      - Standardize metrics, logs, traces, and checks behind one OpenTelemetry collection layer.
      - Move away from environment-specific monitoring assumptions without forcing a day-one app rewrite.
      - Keep rollout automated with Ansible on bare metal and Pulumi plus Helm on GKE.

  - kind: box
    x: 7.1
