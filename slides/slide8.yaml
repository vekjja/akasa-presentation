background: white
elements:
  - kind: title
    text: Key Presentation Takeaways

  - kind: subtitle
    text: The points that matter most to stakeholders and engineering teams

  - kind: bullets
    x: 0.85
    y: 1.55
    w: 11.7
    h: 4.8
    font_size: 19
    bullets:
      - We avoided a high-risk rewrite by preserving DogStatsD compatibility first.
      - Bare metal was the right place to validate and tune OpenTelemetry before scaling the rollout.
      - The GKE management cluster made the platform repeatable with Pulumi, official charts, and a collector DaemonSet.
      - Migrating HTTP checks exposed a product gap, and that gap was closed with an upstream contribution to SigNoz.
      - The new platform made it possible to create alerts directly from dashboards instead of managing those views separately.
      - A pilot service on the OpenTelemetry SDK created a controlled path to final switchover.
